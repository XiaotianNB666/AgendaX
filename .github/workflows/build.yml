name: Build AgendaX Installer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executables with PyInstaller
        run: |
          pyinstaller -F app_launcher.py -n AgendaXLauncher --add-data "resources;resources"
          pyinstaller -F app_main.py -n AgendaX --add-data "resources;resources" --collect-all sqlalchemy
          pyinstaller -F app_server.py -n AgendaXServer --add-data "resources;resources" --collect-all sqlalchemy

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Installer
        run: |
          iscc installer/setup.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgendaX_Setup
          path: dist/AgendaX_Setup.exe